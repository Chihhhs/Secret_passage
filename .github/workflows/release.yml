name: Create Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: windows-latest # 調整為 Windows 環境以編譯 .exe 檔案

    # 必須明確宣告 contents: write 權限，否則寫入 Release 時會被 GITHUB_TOKEN 阻擋
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole src/module/client.py

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/client.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}